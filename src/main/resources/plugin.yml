name: DistrictRP
version: 1.0.0
main: dev.breach.DistrictRP.DistrictRP
api-version: '1.20'
author: visualizzazione
description: Core Plugin by visualizzazione, full staff system, world management, elevators and some other utilities.
load: POSTWORLD
softdepend:
  - LuckPerms
  - TAB
  - SkinsRestorer
  - Multiverse-Core
  - PlaceholderAPI

commands:
  districtrp:
    description: Apre il pannello DistrictRP
    usage: /cc [sub-comando]
    aliases:
      - cc
    permission: DistrictRP.use
    permission-message: §c✗ Non hai accesso a DistrictRP.

  spawn:
    description: Teleport allo spawn
    usage: /spawn [world]
    permission: DistrictRP.spawn
  setspawn:
    description: Imposta lo spawn del mondo
    usage: /setspawn [world]
    permission: DistrictRP.setspawn

  back:
    description: Torna alla posizione precedente
    usage: /back
    permission: DistrictRP.back

  fly:
    description: Attiva volo
    usage: /fly [player]
    permission: DistrictRP.fly
  god:
    description: Godmode
    usage: /god [player]
    permission: DistrictRP.god
  speed:
    description: Velocita
    usage: /speed <0-10> [player]
    permission: DistrictRP.speed

  gms:
    description: Survival
    usage: /gms [player]
    permission: DistrictRP.gamemode
  gmc:
    description: Creative
    usage: /gmc [player]
    permission: DistrictRP.gamemode
  gma:
    description: Adventure
    usage: /gma [player]
    permission: DistrictRP.gamemode
  gmsp:
    description: Spectator
    usage: /gmsp [player]
    permission: DistrictRP.gamemode

  msg:
    description: Messaggio privato
    usage: /msg <player> <messaggio>
    permission: DistrictRP.msg
  reply:
    description: Rispondi
    usage: /reply <messaggio>
    aliases:
      - r
    permission: DistrictRP.msg

  nick:
    description: Imposta nick
    usage: /nick <nick> [player]
    permission: DistrictRP.nick

  invsee:
    description: Apri inventario
    usage: /invsee <player>
    permission: DistrictRP.invsee
  enderchest:
    description: Apri enderchest
    usage: /enderchest [player]
    aliases:
      - ec
    permission: DistrictRP.enderchest
  clear:
    description: Svuota inventario
    usage: /clear [player]
    permission: DistrictRP.clear

  tphere:
    description: Teleporta giocatore da te
    usage: /tphere <player>
    permission: DistrictRP.tphere
  tpall:
    description: Teleporta tutti
    usage: /tpall
    permission: DistrictRP.tpall

  clearchat:
    description: Pulisci chat
    usage: /clearchat
    aliases:
      - chatclear
    permission: DistrictRP.clearchat

  build:
    description: Mondo build
    usage: /build
    aliases:
      - assets
    permission: DistrictRP.buildworld
  inizia:
    description: Vai alla citta
    usage: /inizia

  mondo:
    description: Gestione mondi (Multiverse)
    usage: /mondo <aggiungi|rimuovi|visita|lista|whitelist|blacklist>
    aliases:
      - mondi
    permission: DistrictRP.mondo

  vanish:
    description: Diventa invisibile ai giocatori non-staff
    usage: /vanish [player]
    aliases:
      - v
    permission: DistrictRP.vanish
  staffmode:
    description: Attiva/disattiva la modalita staff completa
    usage: /staffmode
    aliases:
      - sm
      - staff
    permission: DistrictRP.staffmode

  azione:
    description: Chat azione (raggio 10)
    usage: /azione <testo>
    aliases:
      - a
  bisbiglio:
    description: Chat bisbiglio (raggio 2)
    usage: /bisbiglio <testo>
  urlo:
    description: Chat urlo (raggio 20)
    usage: /urlo <testo>

  chatsym:
    description: Gestione simboli chat
    usage: /chatsym <aggiungi|rimuovi> <args>
    permission: DistrictRP.staffchatsym

  emoji:
    description: Apri menu emoji
    usage: /emoji

  stafflist:
    description: Lista staff online
    usage: /stafflist
    aliases:
      - sl

  ticket:
    description: Sistema tickets
    usage: /ticket <crea|chiudi|info|commenta|lista|claim|riapri>
    aliases:
      - aiuto

  supporto:
    description: Richiedi supporto rapido
    usage: /supporto

  appuntamento:
    description: Fissa un appuntamento
    usage: /appuntamento
    aliases:
      - appuntamenti

  stuck:
    description: Teletrasporto di emergenza
    usage: /stuck
    aliases:
      - bloccato

  playtime:
    description: Mostra tempo di gioco
    usage: /playtime [player]
    aliases:
      - info

  logs:
    description: Visualizza logs modulari
    usage: /logs <modulo> [player] [pagina]
    permission: DistrictRP.logs

  protection:
    description: Gestione protezione mondi
    usage: /protection
    aliases:
      - prot
    permission: DistrictRP.protection.admin

  appuntamento_select_reparto:
    description: (internal) Callback GUI appuntamenti
    usage: /appuntamento_select_reparto <reparto>
  appuntamento_select_giorno:
    description: (internal) Callback GUI appuntamenti
    usage: /appuntamento_select_giorno <giorno>
  appuntamento_fascia_page:
    description: (internal) Callback GUI appuntamenti
    usage: /appuntamento_fascia_page <page>
  appuntamento_select_orario:
    description: (internal) Callback GUI appuntamenti
    usage: /appuntamento_select_orario <orario>
  ticket_quickreplies:
    description: (internal) Callback GUI risposte rapide ticket
    usage: /ticket_quickreplies <id>
  ticket_cancel_comment:
    description: (internal) Callback cancellazione commento ticket
    usage: /ticket_cancel_comment <ticketId> <commentIdx>
  supporto_continua:
    description: (internal) Callback continua supporto
    usage: /supporto_continua
  chat:
    aliases: [ c ]
    description: Usa le chat configurate con ChatGate
    usage: /chat <nome> [messaggio]

  chatgate:
    description: Comando principale gestione ChatGate
    usage: /chatgate [reload|create|delete|help]
    permission: chatgate.use
    aliases:
      - cg

  wipe:
    description: Resetta dati di un player (ruoli, progressi, playtime, all)
    usage: /wipe <player> <ruoli|progressi|playtime|all> [confirm]
    permission: DistrictRP.wipe

  profilo:
    description: Gestione profilo RP (staff only)
    usage: /profilo <sub> <player> [valore]
    aliases:
      - profile
    permission: DistrictRP.profile.admin


permissions:

  DistrictRP.profile.admin:
    description: Gestione profili RP
    default: op
  DistrictRP.stuck.admin:
    description: Gestione punti sicuri per /stuck
    default: op
  DistrictRP.vip:
    description: Rank VIP
    default: false
  DistrictRP.vipplus:
    description: Rank VIP+
    default: false
  DistrictRP.mvp:
    description: Rank MVP
    default: false
  DistrictRP.mvpplus:
    description: Rank MVP+
    default: false

  DistrictRP.wipe:
    description: Usa /wipe per resettare dati player
    default: op

  chatgate.use:
    description: Uso base chatgate
    default: op
  chatgate.reload:
    description: Ricarica config chatgate
    default: op
  chatgate.create:
    description: Crea nuove chat
    default: op
  chatgate.delete:
    description: Elimina chat esistenti
    default: op
  chatgate.antispam.bypass:
    description: Bypass antispam chatgate
    default: op

  DistrictRP.*:
    description: Tutti i permessi DistrictRP
    default: op
    children:
      DistrictRP.staff: true
      DistrictRP.admin: true

  DistrictRP.staff:
    description: Permessi generici staff
    default: op
