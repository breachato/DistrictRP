name: DistrictRP
version: 2.2.0
main: dev.breach.DistrictRP.DistrictRP
api-version: '1.20'
author: breachato
description: Roleplay Core made by breachato
load: POSTWORLD
softdepend:
  - LuckPerms
  - TAB
  - SkinsRestorer
  - Multiverse-Core
  - PlaceholderAPI
  - CoreProtect
  - WorldGuard
  - WorldEdit

commands:
  staffauth:
    usage: /staffauth <register|password> <email> <password> [player]
    permission: DistrictRP.staffpanel.command.staffauth
  districtrp:
    usage: /districtrp [sub-comando]
    aliases: [drp]
    permission: DistrictRP.use
  cam:
    description: Gestione camera loading screen
    usage: /cam <aggiungi|rimuovi|teletrasporta>
    permission: DistrictRP.camera
  spawn:
    usage: /spawn [world]
    permission: DistrictRP.spawn
  setspawn:
    usage: /setspawn [world]
    permission: DistrictRP.setspawn
  back:
    usage: /back
    permission: DistrictRP.back
  fly:
    usage: /fly [player]
    permission: DistrictRP.fly
  god:
    usage: /god [player]
    permission: DistrictRP.god
  speed:
    usage: /speed <0-10> [player]
    permission: DistrictRP.speed
  gms:
    usage: /gms [player]
    permission: DistrictRP.gamemode
  gmc:
    usage: /gmc [player]
    permission: DistrictRP.gamemode
  gma:
    usage: /gma [player]
    permission: DistrictRP.gamemode
  gmsp:
    usage: /gmsp [player]
    permission: DistrictRP.gamemode
  msg:
    usage: /msg <player> <messaggio>
    permission: DistrictRP.msg
  reply:
    usage: /reply <messaggio>
    aliases: [r]
    permission: DistrictRP.msg
  nick:
    usage: /nick <nick> [player]
    permission: DistrictRP.nick
  invsee:
    usage: /invsee <player>
    permission: DistrictRP.invsee
  enderchest:
    usage: /enderchest [player]
    aliases: [ec]
    permission: DistrictRP.enderchest
  clear:
    usage: /clear [player]
    permission: DistrictRP.clear
  tphere:
    usage: /tphere <player>
    permission: DistrictRP.tphere
  tpall:
    usage: /tpall
    permission: DistrictRP.tpall
  clearchat:
    usage: /clearchat
    aliases: [chatclear]
    permission: DistrictRP.clearchat
  build:
    usage: /build
    aliases: [assets]
    permission: DistrictRP.buildworld
  mondo:
    usage: /mondo <sub>
    aliases: [mondi]
    permission: DistrictRP.mondo
  vanish:
    usage: /vanish [player]
    aliases: [v]
    permission: DistrictRP.vanish
  staffmode:
    usage: /staffmode
    aliases: [sm, staff]
    permission: DistrictRP.staffmode
  scale:
    description: Cambia la scala del player
    usage: /scale <valore> [player]
    permission: DistrictRP.scale
  azione:
    usage: /azione <testo>
    aliases: [a]
  bisbiglio:
    usage: /bisbiglio <testo>
  urlo:
    usage: /urlo <testo>
  chatsym:
    usage: /chatsym <sub>
    permission: DistrictRP.staffchatsym
  emoji:
    usage: /emoji
  stafflist:
    usage: /stafflist
    aliases: [sl]
  plots:
    description: Gestione plot italiana DistrictRP
    usage: /plots <sub>
    aliases: [plot, p, ps]
    permission: DistrictRP.plot.use
  ticket:
    usage: /ticket <sub>
    aliases: [aiuto]
  supporto:
    usage: /supporto
  appuntamento:
    usage: /appuntamento
    aliases: [appuntamenti]
  stuck:
    usage: /stuck
    aliases: [bloccato]
  playtime:
    usage: /playtime [player]
    aliases: [info]
  logs:
    usage: /logs <modulo> [player] [pagina]
    permission: DistrictRP.logs
  protection:
    usage: /protection
    aliases: [prot]
    permission: DistrictRP.protection.admin
  warp:
    usage: /warp <nome>
    permission: DistrictRP.warp.use
  setwarp:
    usage: /setwarp <nome> [permesso]
    permission: DistrictRP.warp.manage
  delwarp:
    usage: /delwarp <nome>
    permission: DistrictRP.warp.manage
  chat:
    aliases: [c]
    usage: /chat <nome> [messaggio]
  chatgate:
    usage: /chatgate [sub]
    permission: chatgate.use
    aliases: [cg]
  wipe:
    usage: /wipe <player> <tipo> [confirm]
    permission: DistrictRP.wipe
  profilo:
    usage: /profilo <sub> <player> [valore]
    aliases: [profile]
    permission: DistrictRP.profile.admin
  appuntamento_select_reparto:
    usage: /appuntamento_select_reparto
  appuntamento_select_giorno:
    usage: /appuntamento_select_giorno
  appuntamento_fascia_page:
    usage: /appuntamento_fascia_page
  appuntamento_select_orario:
    usage: /appuntamento_select_orario
  ticket_quickreplies:
    usage: /ticket_quickreplies
  ticket_cancel_comment:
    usage: /ticket_cancel_comment
  supporto_continua:
    usage: /supporto_continua
  staffchat:
    description: Staff chat cross-server
    usage: /staffchat <msg>
    aliases: [ sc ]
  modchat:
    description: Mod chat cross-server
    usage: /modchat <msg>
    aliases: [ mc ]
  adminchat:
    description: Admin chat cross-server
    usage: /adminchat <msg>
    aliases: [ ac ]
  builderchat:
    description: Builder chat cross-server
    usage: /builderchat <msg>
    aliases: [ bc ]
  devchat:
    description: Dev chat cross-server
    usage: /devchat <msg>
    aliases: [ dc ]

