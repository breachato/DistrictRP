      - ''
      - '&7Nome: &f%player%'
      - ''
      - '&#FCD05Cбҙ„КҹЙӘбҙ„бҙ„бҙҖ бҙҳбҙҮКҖ бҙ„бҙҸбҙҳЙӘбҙҖКҖбҙҮ ЙӘКҹ ЙҙбҙҸбҙҚбҙҮ'
  formats:
    normal: '&7%rp_name% &8В» &f%message%'
    azione:
      radius: 15
      format: '&#FCD05CбҙҖбҙўЙӘбҙҸЙҙбҙҮ &r&7%rp_name% &8В» &e%message%'
      anonymous: '&#FCD05CбҙҖбҙўЙӘбҙҸЙҙбҙҮ &r&7&oAnonimo &8В» &e%message%'
    bisbiglio:
