prefix: '&#FCD05C&lбҙ…ЙӘкңұбҙӣКҖЙӘбҙ„бҙӣКҖбҙҳ &8В» &r'

storage:
  type: YAML

  mariadb:
    host: localhost
    port: 3306
    database: districtrp
    username: root
    password: ''
    table-prefix: drp_
    pool-size: 10
    connection-timeout-ms: 30000
    idle-timeout-ms: 600000
    max-lifetime-ms: 1800000
    use-ssl: false

staff-notify:
  permission: DistrictRP.staff.notify

join:
  message: '&8+ %player%'

quit:
  message: '&8- %player%'

command-blocker:
  enabled: true
  override:
    - spawn
    - setspawn
    - tphere
    - tpall
    - fly
    - god
    - vanish
    - msg
    - reply
    - r
  unregister:
    - help
    - '?'

chat:
  proximity:
    enabled: true
    radius: 15
    nobody-in-range-message: false
  hover:
    enabled: true
    lines:
      - ''
      - '&7Nome: &#D7D7D7%rp_name%'
      - '&7Cognome: &#D7D7D7%rp_surname%'
      - '&7Codice Fiscale: &#D7D7D7%player%'
      - ''
      - '&#FCD05Cбҙ„КҹЙӘбҙ„бҙ„бҙҖ бҙҳбҙҮКҖ бҙ„бҙҸбҙҳЙӘбҙҖКҖбҙҮ ЙӘКҹ ЙҙбҙҸбҙҚбҙҮ'
    lines-no-rp:
      - ''
      - '&7Nome: &#D7D7D7%player%'
      - ''
      - '&#FCD05Cбҙ„КҹЙӘбҙ„бҙ„бҙҖ бҙҳбҙҮКҖ бҙ„бҙҸбҙҳЙӘбҙҖКҖбҙҮ ЙӘКҹ ЙҙбҙҸбҙҚбҙҮ'
  formats:
    normal: '&7%rp_name% &8В» &#D7D7D7%message%'
    roleplay: '%chat_prefix%%name_color%%display_name% &8В» %msg_color%%message%'
    azione:
      radius: 15
      format: '&#FCD05CбҙҖбҙўЙӘбҙҸЙҙбҙҮ &r&7%rp_name% &8В» &e%message%'
      anonymous: '&#FCD05CбҙҖбҙўЙӘбҙҸЙҙбҙҮ &r&7&oAnonimo &8В» &e%message%'
    bisbiglio:
      radius: 15
      format: '&3&lКҷЙӘкңұКҷЙӘЙўКҹЙӘбҙҸ &r&7%rp_name% &8В» &3%message%'
      anonymous: '&3&lКҷЙӘкңұКҷЙӘЙўКҹЙӘбҙҸ &r&7&oAnonimo &8В» &3%message%'
    urlo:
      radius: 25
      format: '&c&lбҙңКҖКҹбҙҸ &r&7%rp_name% &8В» &c%message%'
      anonymous: '&c&lбҙңКҖКҹбҙҸ &7&oAnonimo &8В» &c%message%'

