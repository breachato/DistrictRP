ticket:
  gui-title: '&#FCD05CкңұбҙҮКҹбҙҮбҙўЙӘбҙҸЙҙбҙҖ бҙ„бҙҖбҙӣбҙҮЙўбҙҸКҖЙӘбҙҖ'
  staff-permission: DistrictRP.ticket.staff
  list-per-page: 10
  date-format: dd/MM/yyyy HH:mm
  quick-replies:
    generale:
      - Ciao %player%! Ci puoi fornire maggiori dettagli sulla tua segnalazione?
      - Ciao %player%, la tua richiesta ГЁ stata inoltrata al reparto competente.
      - Grazie per averci contattato, la segnalazione ГЁ in fase di valutazione.
      - Chiudo il ticket per inattivitГ , sentiti libero di riaprirlo se necessario.
    tecnico:
      - Ciao %player%! Puoi fornirci uno screenshot o un video del problema?
      - Prova a riavviare il client e a rientrare, se il problema persiste facci sapere.
      - Il problema ГЁ stato segnalato al team tecnico, ti aggiorneremo appena risolto.
    strutture:
      - Ciao %player%! Il reparto edilizia valuterГ  la tua richiesta.
      - La tua richiesta di costruzione ГЁ stata approvata.
    aziende:
      - Ciao %player%! La richiesta ГЁ stata inoltrata al reparto aziende.
      - La tua azienda ГЁ stata approvata, ti auguriamo buon lavoro.
    fdo:
      - Ciao %player%! La segnalazione ГЁ stata presa in carico dalle FDO.
      - La verifica ГЁ in corso, ti aggiorneremo al piГ№ presto.
    criminalita:
      - Ciao %player%! La tua segnalazione ГЁ stata registrata correttamente.
      - Le prove sono state acquisite, la pratica ГЁ in fase di valutazione.
    politica:
      - Ciao %player%! La tua richiesta politica ГЁ in fase di analisi.
      - Ti risponderemo entro 24-48 ore lavorative.
  categories:
    generale:
      name: '&#FCD05CЙўбҙҮЙҙбҙҮКҖбҙҖКҹбҙҮ'
      material: FILLED_MAP
