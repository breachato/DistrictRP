      slot: 0
      material: RECOVERY_COMPASS
      name: '&#FCD05C&lᴛᴇʟᴇᴛʀᴀꜱᴘᴏʀᴛᴏ ᴄᴀꜱᴜᴀʟᴇ'
      lore:
        - ''
        - '&7Click destro per teletrasportarti'
        - '&7ad un giocatore casuale online.'
    invisibility:
      slot: 1
      material: BLAZE_ROD
      name: '&#FCD05C&lɪɴᴠɪꜱɪʙɪʟɪᴛà (ᴠᴀɴɪꜱʜ)'
      lore:
        - ''
        - '&7Click destro per attivare/disattivare'
        - '&7il vanish. Gli staff si vedono tra loro.'
    player-list:
      slot: 4
      material: ENDER_PEARL
      name: '&#FCD05C&lʟɪꜱᴛᴀ ɢɪᴏᴄᴀᴛᴏʀɪ'
      lore:
        - ''
        - '&7Click destro per visualizzare tutti'
        - '&7i giocatori online.'
    staff-list:
      slot: 7
      material: BOOK
      name: '&#FCD05C&lʟɪꜱᴛᴀ ꜱᴛᴀꜰꜰ'
      lore:
        - ''
        - '&7Click destro per visualizzare tutti'
        - '&7gli staff online.'
