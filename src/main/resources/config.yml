      format: '&3&lКҷЙӘкңұКҷЙӘЙўКҹЙӘбҙҸ &r&7%rp_name% &8В» &3%message%'
      anonymous: '&3&lКҷЙӘкңұКҷЙӘЙўКҹЙӘбҙҸ &r&7&oAnonimo &8В» &3%message%'
    urlo:
      radius: 25
      format: '&c&lбҙңКҖКҹбҙҸ &r&7%rp_name% &8В» &c%message%'
      anonymous: '&c&lбҙңКҖКҹбҙҸ &7&oAnonimo &8В» &c%message%'

