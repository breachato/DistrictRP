ticket:
  gui-title: '&#FCD05Cꜱᴇʟᴇᴢɪᴏɴᴀ ᴄᴀᴛᴇɢᴏʀɪᴀ'
  staff-permission: DistrictRP.ticket.staff
  list-per-page: 10
  date-format: dd/MM/yyyy HH:mm
  quick-replies:
    generale:
      - Ciao %player%! Ci puoi fornire maggiori dettagli sulla tua segnalazione?
      - Ciao %player%, la tua richiesta è stata inoltrata al reparto competente.
      - Grazie per averci contattato, la segnalazione è in fase di valutazione.
      - Chiudo il ticket per inattività, sentiti libero di riaprirlo se necessario.
    tecnico:
      - Ciao %player%! Puoi fornirci uno screenshot o un video del problema?
      - Prova a riavviare il client e a rientrare, se il problema persiste facci sapere.
      - Il problema è stato segnalato al team tecnico, ti aggiorneremo appena risolto.
    strutture:
      - Ciao %player%! Il reparto edilizia valuterà la tua richiesta.
      - La tua richiesta di costruzione è stata approvata.
    aziende:
      - Ciao %player%! La richiesta è stata inoltrata al reparto aziende.
      - La tua azienda è stata approvata, ti auguriamo buon lavoro.
    fdo:
      - Ciao %player%! La segnalazione è stata presa in carico dalle FDO.
      - La verifica è in corso, ti aggiorneremo al più presto.
    criminalita:
      - Ciao %player%! La tua segnalazione è stata registrata correttamente.
      - Le prove sono state acquisite, la pratica è in fase di valutazione.
    politica:
      - Ciao %player%! La tua richiesta politica è in fase di analisi.
      - Ti risponderemo entro 24-48 ore lavorative.
  categories:
    generale:
      name: '&#FCD05Cɢᴇɴᴇʀᴀʟᴇ'
      material: FILLED_MAP
      slot: 10
      permission-notify: DistrictRP.reparto.generale
      lore:
        - '&7Assistenza di categoria generale.'
        - ''
        - '&#FCD05Cᴄʟɪᴄᴄᴀ ᴘᴇʀ ꜱᴇʟᴇᴢɪᴏɴᴀʀᴇ'
    tecnico:
      name: '&bʙᴜɢ ᴇ ᴀꜱꜱɪꜱᴛᴇɴᴢᴀ ᴛᴇᴄɴɪᴄᴀ'
      material: REDSTONE
      slot: 11
      permission-notify: DistrictRP.reparto.tecnico
      lore:
        - '&7Problemi tecnici, bug, crash.'
        - ''
        - '&#FCD05Cᴄʟɪᴄᴄᴀ ᴘᴇʀ ꜱᴇʟᴇᴢɪᴏɴᴀʀᴇ'
    strutture:
      name: '&6ꜱᴛʀᴜᴛᴛᴜʀᴇ ᴇ ᴄᴏꜱᴛʀᴜᴢɪᴏɴɪ'
      material: BRICKS
      slot: 12
      permission-notify: DistrictRP.reparto.edilizia
      lore:
        - '&7Richieste costruzioni, rimozioni lock.'
        - ''
        - '&#FCD05Cᴄʟɪᴄᴄᴀ ᴘᴇʀ ꜱᴇʟᴇᴢɪᴏɴᴀʀᴇ'
    aziende:
      name: '&#D7D7D7ᴀᴢɪᴇɴᴅᴇ'
      material: OAK_SIGN
      slot: 13
      permission-notify: DistrictRP.reparto.aziende
      lore:
        - '&7Assistenza legata al reparto aziende.'
        - ''
        - '&#FCD05Cᴄʟɪᴄᴄᴀ ᴘᴇʀ ꜱᴇʟᴇᴢɪᴏɴᴀʀᴇ'
    fdo:
      name: '&9ꜰᴏʀᴢᴇ ᴅᴇʟʟ''ᴏʀᴅɪɴᴇ'
      material: SHIELD
      slot: 14
      permission-notify: DistrictRP.reparto.fdo
      lore:
        - '&7Segnalazioni e richieste FDO.'
        - ''
        - '&#FCD05Cᴄʟɪᴄᴄᴀ ᴘᴇʀ ꜱᴇʟᴇᴢɪᴏɴᴀʀᴇ'
    criminalita:
      name: '&8ᴄʀɪᴍɪɴᴀʟɪᴛᴀ̀'
      material: IRON_BARS
      slot: 15
      permission-notify: DistrictRP.reparto.criminalita
      lore:
        - '&7Segnalazioni e richieste criminalità.'
        - ''
        - '&#FCD05Cᴄʟɪᴄᴄᴀ ᴘᴇʀ ꜱᴇʟᴇᴢɪᴏɴᴀʀᴇ'
    politica:
      name: '&dᴘᴏʟɪᴛɪᴄᴀ'
      material: SUNFLOWER
      slot: 16
      permission-notify: DistrictRP.reparto.politica
      lore:
        - '&7Assistenze o richieste politiche.'
        - ''
        - '&#FCD05Cᴄʟɪᴄᴄᴀ ᴘᴇʀ ꜱᴇʟᴇᴢɪᴏɴᴀʀᴇ'

