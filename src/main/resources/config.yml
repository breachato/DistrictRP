prefix: '&#FCD05C&lᴅɪꜱᴛʀɪᴄᴛʀᴘ &8» &r'

storage:
  type: YAML

staff-notify:
  permission: DistrictRP.staff.notify

join:
  message: '&8+ %player%'

quit:
  message: '&8- %player%'

command-blocker:
  enabled: true
  override:
    - spawn
    - setspawn
    - tphere
    - tpall
    - fly
    - god
    - vanish
    - msg
    - reply
    - r
  unregister:
    - help
    - '?'

chat:
  proximity:
    enabled: true
    radius: 15
    nobody-in-range-message: false
  hover:
    enabled: true
    lines:
      - ''
      - '&7Nome: &#D7D7D7%rp_name%'
      - '&7Cognome: &#D7D7D7%rp_surname%'
      - '&7Codice Fiscale: &#D7D7D7%player%'
      - ''
      - '&#FCD05Cᴄʟɪᴄᴄᴀ ᴘᴇʀ ᴄᴏᴘɪᴀʀᴇ ɪʟ ɴᴏᴍᴇ'
    lines-no-rp:
      - ''
      - '&7Nome: &#D7D7D7%player%'
      - ''
      - '&#FCD05Cᴄʟɪᴄᴄᴀ ᴘᴇʀ ᴄᴏᴘɪᴀʀᴇ ɪʟ ɴᴏᴍᴇ'
  formats:
    normal: '&7%rp_name% &8» &#D7D7D7%message%'
    azione:
      radius: 15
      format: '&#FCD05Cᴀᴢɪᴏɴᴇ &r&7%rp_name% &8» &e%message%'
      anonymous: '&#FCD05Cᴀᴢɪᴏɴᴇ &r&7&oAnonimo &8» &e%message%'
    bisbiglio:
      radius: 15
      format: '&3&lʙɪꜱʙɪɢʟɪᴏ &r&7%rp_name% &8» &3%message%'
      anonymous: '&3&lʙɪꜱʙɪɢʟɪᴏ &r&7&oAnonimo &8» &3%message%'
    urlo:
      radius: 25
      format: '&c&lᴜʀʟᴏ &r&7%rp_name% &8» &c%message%'
      anonymous: '&c&lᴜʀʟᴏ &7&oAnonimo &8» &c%message%'

clearchat:
  permission: DistrictRP.clearchat
  bypass-permission: DistrictRP.clearchat.bypass
  lines: 2000

spawn:
