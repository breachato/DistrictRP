  block-drop: true
  block-inventory-change: true
  block-block-break: true
  block-block-place: true
  block-damage: true
  restore-location-on-exit: false
  actionbar:
    enabled: true
    refresh-ticks: 20
    header: '&#FCD05C\uF50Aᴀɴɪꜱʜᴇᴅ %vanish_state% &fᴛᴘꜱ: &#FCD05C%tps%'
    vanish-on: '&#FCD05C(✔)'
    vanish-off: '&c(✗)'
    subline-tp-random: '&e✈ &fᴛᴇʟᴇᴛʀᴀꜱᴘᴏʀᴛᴏ ᴄᴀꜱᴜᴀʟᴇ'
    subline-invisibility: '&d✿ &fɪɴᴠɪꜱɪʙɪʟɪᴛà (ᴠᴀɴɪꜱʜ)'
    subline-player-list: '&b☰ &fʟɪꜱᴛᴀ ɢɪᴏᴄᴀᴛᴏʀɪ'
    subline-staff-list: '&5✎ &fʟɪꜱᴛᴀ ꜱᴛᴀꜰꜰ'
    subline-exit: '&c✖ &fᴇꜱᴄɪ ᴅᴀ ꜱᴛᴀꜰꜰ ᴍᴏᴅᴇ'
    subline-none: ''
  gui:
    player-list-title: '&8Lista Giocatori'
    staff-list-title: '&8Lista Staff'
    player-list-rows: 6
    staff-list-rows: 6
  items:
